spring.application.name=election-management-api
server.port=8080

# PostgreSQL Docker connection
spring.datasource.url=jdbc:postgresql://localhost:5432/ElectionDB
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

# JWT
app.jwt.secret=change-this-development-secret-key-before-production-1234567890
app.jwt.expiration-ms=86400000

# React frontend
app.cors.allowed-origins=http://localhost:5173

# Default administrator
app.bootstrap-admin.username=admin
app.bootstrap-admin.email=admin@ems.com
app.bootstrap-admin.password=admin123