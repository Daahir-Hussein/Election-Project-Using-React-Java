spring.datasource.url=jdbc:h2:mem:ems;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
app.jwt.secret=test-secret-key-that-is-long-enough-for-hmac-sha-256-signing
app.jwt.expiration-ms=3600000
app.cors.allowed-origins=http://localhost:5173
app.upload.dir=target/test-uploads
app.bootstrap-admin.username=admin
app.bootstrap-admin.email=admin@ems.local
app.bootstrap-admin.password=admin123

spring.jpa.open-in-view=false
